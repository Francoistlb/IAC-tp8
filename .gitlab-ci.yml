stages:
  - validate
  - plan
  - apply

variables:
  TF_ROOT: ${CI_PROJECT_DIR}
  TF_VERSION: "1.5"

before_script:
  - cd ${TF_ROOT}

validate:
  stage: validate
  image: hashicorp/terraform:${TF_VERSION}
  script:
    - terraform init
    - terraform validate
  only:
    - merge_requests
    - main
    - develop

plan:
  stage: plan
  image: hashicorp/terraform:${TF_VERSION}
  script:
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/tfplan
    expire_in: 7 days
  only:
    - merge_requests
    - main
    - develop

tflint:
  stage: validate
  image: ghcr.io/terraform-linters/tflint:latest
  script:
    - tflint --init
    - tflint
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

tfsec:
  stage: validate
  image: aquasecurity/tfsec:latest
  script:
    - tfsec .
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

apply:
  stage: apply
  image: hashicorp/terraform:${TF_VERSION}
  script:
    - terraform init
    - terraform apply -auto-approve tfplan
  when: manual
  dependencies:
    - plan
  only:
    - main
